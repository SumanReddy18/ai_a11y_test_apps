name: Build iOS IPAs

# Builds UNSIGNED .ipa files for the iOS accessibility fixture (ios/) on a GitHub-hosted
# macOS runner, where the iOS SDK is preinstalled — so nothing has to be downloaded locally.
# BrowserStack re-signs uploaded apps, so an unsigned .ipa is sufficient for a scan; that's
# why no Apple certificates / provisioning secrets are needed here.
#
# Output filenames mirror the Android APKs 1:1, with a .ipa extension:
#   ai-app-a11y-detection-v<version>.ipa                 (full)
#   ai-app-a11y-detection-<flavor>-v<version>.ipa        (each single-issue flavor)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string used in the .ipa filenames (e.g. 1.3.0)"
        required: false
        default: "1.3.0"
  push:
    branches: [main]
    paths: ['ios/**', '.github/workflows/ios-ipa.yml']

jobs:
  build:
    runs-on: macos-14       # ships a working Xcode + iOS SDK out of the box
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Resolve & validate version
        id: ver
        env:
          RAW_VERSION: ${{ github.event.inputs.version || '1.3.0' }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$RAW_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version '$RAW_VERSION' (expected N.N.N)"; exit 1
          fi
          echo "version=$RAW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: xcodebuild -version && xcodebuild -showsdks | grep -i iphoneos

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .ipa for every flavor
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # scheme : android-flavor-suffix  (empty suffix = the "full" app, no suffix)
          MAP=(
            "A11yDemo:"
            "A11yDemo-AllViolations:allviolations"
            "A11yDemo-ImagesText:imagestext"
            "A11yDemo-ImageViewLabel:imageviewlabel"
            "A11yDemo-InteractiveLabel:interactivelabel"
            "A11yDemo-ReadingOrder:readingorder"
            "A11yDemo-VisualOrder:visualorder"
            "A11yDemo-MissingHeading:missingheading"
            "A11yDemo-IncorrectHeading:incorrectheading"
            "A11yDemo-LinkTextPurpose:linktextpurpose"
          )
          mkdir -p artifacts
          for ENTRY in "${MAP[@]}"; do
            SCHEME="${ENTRY%%:*}"
            SUFFIX="${ENTRY#*:}"
            if [ -z "$SUFFIX" ]; then
              OUT="ai-app-a11y-detection-v${VERSION}.ipa"
            else
              OUT="ai-app-a11y-detection-${SUFFIX}-v${VERSION}.ipa"
            fi

            echo "::group::Building $SCHEME -> $OUT"
            rm -rf dd Payload
            xcodebuild build \
              -project A11yDemo.xcodeproj \
              -scheme "$SCHEME" \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath dd \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=""

            APP=$(find dd/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -1)
            if [ -z "$APP" ]; then echo "No .app produced for $SCHEME"; exit 1; fi

            # Package the .app into an unsigned .ipa (Payload/<App>.app zipped at root).
            mkdir -p Payload
            cp -R "$APP" Payload/
            zip -qry "artifacts/${OUT}" Payload
            rm -rf Payload
            echo "Packaged artifacts/${OUT}"
            echo "::endgroup::"
          done
          echo "=== built IPAs ==="
          ls -lh artifacts

      - name: Upload IPAs
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipas-v${{ steps.ver.outputs.version }}
          path: ios/artifacts/*.ipa
          if-no-files-found: error
